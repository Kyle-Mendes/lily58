CONFIG_ZMK_DISPLAY=y
# Use the custom text-only status screen (src/custom_status_screen.c) instead
# of the built-in one, whose icon glyphs render as garbage on this OLED.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_RGB_UNDERGLOW=y
# 24 WS2812 LEDs per side at full brightness draw more than the nice!nano
# regulator can supply cleanly, causing dimming/flicker. Cap it.
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=60
