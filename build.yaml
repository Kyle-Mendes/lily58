# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  - board: nice_nano@1//zmk
    shield: lily58_left
  - board: nice_nano@1//zmk
    shield: lily58_right
  - board: nice_nano//zmk
    shield: corne_left
  - board: nice_nano//zmk
    shield: corne_right
  # one-time use to clear stale settings after the Zephyr 4.1 migration;
  # flash to both halves, then reflash corne_left/right. remove when done.
  - board: nice_nano//zmk
    shield: settings_reset
